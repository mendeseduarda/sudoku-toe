<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SUDOKU-TOE</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">SUDOKU-TOE</h1>
            <div class="header-right">
                <span>Desenvolvido por Maria Mendes</span>
                <a href="https://github.com/mendeseduarda" class="github-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22v3.293c0 .319.192.694.805.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
            </div>
        </header>

        <main class="game-content">
            <div id="sudoku-board" class="board"></div>

            <div class="side-panel">
                <div id="turn-display" class="turn-banner">Sua vez!</div>
                
                <div class="numpad">
                    <button class="num-btn" onclick="selectBtn(1)">1</button>
                    <button class="num-btn" onclick="selectBtn(2)">2</button>
                    <button class="num-btn" onclick="selectBtn(3)">3</button> 
                    <button class="num-btn" onclick="selectBtn(4)">4</button>
                    <button class="num-btn" onclick="selectBtn(5)">5</button>
                    <button class="num-btn" onclick="selectBtn(6)">6</button>
                    <button class="num-btn" onclick="selectBtn(7)">7</button>
                    <button class="num-btn" onclick="selectBtn(8)">8</button>
                    <button class="num-btn" onclick="selectBtn(9)">9</button>
                </div>

                <div id="toast" class="toast hidden">
                    <span class="close-x">x</span>
                    <p>avisos</p>
                </div>
            </div>
        </main>
    </div>

<script src="/static/script.js"></script>
</body>
</html>
